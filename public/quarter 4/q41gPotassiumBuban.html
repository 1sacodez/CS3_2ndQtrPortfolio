<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating</title>
    <style>
        body{
            background-color: #DEAFB9;
            font-family: 'Verdana';
        }
        h1{
        font-size: 50px;
        text-align: center;
        font-family: Trebuchet MS;
        color: white;
        }
        .movieBox{
            background-color: #FCF5E5;
            width: 90%;
            min-width: 400px;
            max-width: 55%;
            margin: 0 auto;
            height: 100vh;
            border: 2px solid #C08A97;
            border-radius: 10px;
            padding: 20px;
        }
        label{
            font-size: px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], select{
            font-size: 18px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 6px;
        }

        .movie-list{
            font-size: 18px;
            line-height: 2.5;
            margin: 15px;
        }

        button{
            padding: 8px; margin: 4px 0; font-size: 15px;
        }

        input, select{
            width: 95%;
        }

        .rating {
        display: flex;
        flex-direction: row-reverse;
        justify-content: flex-end;
        gap: 20px;
        }

        .rating input { display: none; }

        .rating label {
        font-size: 30px;
        cursor: pointer;
        color: #ccc;
        }

        .rating label:hover,
        .rating label:hover ~ label,
        .rating input:checked ~ label {
        color: gold;
        content: "★";
        }
    </style>
  </head>
  
  <body>
    <h1 class="title">──★ Add a Movie ˙🎬 ̟ !! </h1>
    <div class="movieBox">
      <form id="movieForm">
        <label for="title">Title:</label><br>
        <input type="text" id="title" required><br><br>
        
        <label for="year">Year:</label><br>
        <input type="number" id="year" required><br><br>
        
        <label for="genre">Genre:</label><br>
        <select type="text" id="genre" required><br><br>
          <option value="Action">Action</option>
          <option value="Comedy">Comedy</option>
          <option value="Drama">Drama</option>
          <option value="Horror">Horror</option>
          <option value="Romance">Romance</option>
          <option value="Science Fiction">Science Fiction</option>
          <option value="Documentary">Documentary</option>
        </select>
        <br><br>
        
        <label for="rating">Rating:</label><br>
        <div id="rating" class="rating">
          <input type="radio" name="star" value="5" id="5"><label for="5">★</label>
          <input type="radio" name="star" value="4" id="4"><label for="4">★</label>
          <input type="radio" name="star" value="3" id="3"><label for="3">★</label>
          <input type="radio" name="star" value="2" id="2"><label for="2">★</label>
          <input type="radio" name="star" value="1" id="1"><label for="1">★</label>
        </div>
        <br>
        
        <button type="submit">Add Movie</button>
      </form>
      <br>
    
      <h1 style=color:#b66e8b> ݁˖🎞️ Movie List ─.☘︎</h1>
      
    <div class="movie-list" id="movieList"></div>
      

    <script>
    let movieCollection = JSON.parse(localStorage.getItem("movieCollection")) || {};

    function displayMovie(){
    const list = document.getElementById("movieList");
    list.innerHTML = "";
    for (let key in movieCollection){
        const movie = movieCollection[key];
        const div = document.createElement("div");
        div.className = "movie-item";
        
        const starRating = "★".repeat(movie.rating) + "☆".repeat(5 - movie.rating);
        
        div.innerHTML = `
        <span class="movie-info">
            <strong>${movie.title}</strong> (${movie.year}) - ${movie.genre}  
            <span class="stars">${starRating}</span>
        </span>
        <button class="delete-btn" onclick="deleteMovie('${key}')">Delete</button>
        `;
        list.appendChild(div);
    }
    }

    document.getElementById("movieForm").addEventListener("submit", function(e){
    e.preventDefault();
    const key = document.getElementById("title").value.trim();
    const title = document.getElementById("title").value.trim();
    const year = document.getElementById("year").value.trim();
    const genre = document.getElementById("genre").value.trim();
    const rating = document.querySelector('input[name="star"]:checked')?.value || 0;
    
    movieCollection[key] = {title, year, genre, rating};
    localStorage.setItem("movieCollection", JSON.stringify(movieCollection));
    displayMovie();
    this.reset();
    });

    function deleteMovie(key){
    delete movieCollection[key];
    localStorage.setItem("movieCollection", JSON.stringify(movieCollection));
    displayMovie();
    }

    displayMovie();
    </script>
  </body>
</html>
